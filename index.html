<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WARZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#040904;overflow:hidden;font-family:'Share Tech Mono',monospace;}
canvas{display:block;cursor:crosshair;}

/* ── MENU ── */
#menu{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:radial-gradient(ellipse at 50% 30%,#0a160a 0%,#000 100%);
  z-index:100;overflow-y:auto;padding:20px 20px 80px;}
#menu::before{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,0.022) 2px,rgba(0,255,0,0.022) 4px);}
.menu-title{font-family:'Oswald',sans-serif;font-size:clamp(52px,9vw,108px);font-weight:700;
  color:#ff2020;letter-spacing:14px;text-align:center;margin-bottom:44px;
  text-shadow:0 0 40px #ff000099;animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{text-shadow:0 0 40px #ff000099;}50%{text-shadow:0 0 70px #ff0000cc,0 0 130px #ff000055;}}
.menu-form{display:flex;flex-direction:column;gap:20px;width:min(420px,92vw);align-items:center;}
.m-label{font-size:9px;color:#2a5a2a;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;width:100%;}
.m-input{width:100%;background:rgba(127,255,0,0.06);border:2px solid #1e3a1e;color:#7fff00;
      padding:14px;font-family:'Share Tech Mono',monospace;font-size:15px;outline:none;
      transition:border-color 0.2s;text-align:center;letter-spacing:3px;text-transform:uppercase;}
.m-input::placeholder{color:#7fff00;}
.m-input:focus,.m-input.permanent-focus{border-color:#7fff00;box-shadow:0 0 10px rgba(127,255,0,0.12);}
/* 7-column grid for 7 continents in one row */
.country-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;width:100%;}
/* Default continent button: RED (unselected) */
.c-btn{padding:9px 3px 7px;background:rgba(0,0,0,0.6);border:1px solid #661111;color:#cc3333;
  font-family:'Share Tech Mono',monospace;font-size:8px;cursor:pointer;transition:all 0.2s;text-align:center;line-height:1.6;}
.c-btn:hover{border-color:#ff6666;color:#ff8888;background:rgba(255,50,50,0.05);}
/* Selected: GREEN */
.c-btn.sel{border-color:#7fff00;color:#7fff00;background:rgba(34,204,68,0.1);}
.c-flag{font-size:19px;display:block;margin-bottom:3px;}
/* GREEN deploy button */
.deploy-btn{width:100%;padding:14px;background:rgba(127,255,0,0.06);border:2px solid #7fff00;
      color:#7fff00;font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:400;
      letter-spacing:3px;cursor:pointer;transition:all 0.3s;text-transform:uppercase;}
.deploy-btn:hover:not(:disabled){background:#7fff00;color:#000;box-shadow:0 0 28px rgba(127,255,0,0.5);}
.deploy-btn:active:not(:disabled){background:#7fff00;color:#000;box-shadow:0 0 28px rgba(127,255,0,0.7);}
.deploy-btn:disabled{opacity:0.18;cursor:not-allowed;}
/* Instructions fixed at bottom of screen */
.m-ctrl{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  font-size:14px;color:#1a3a1a;font-family:'Share Tech Mono',monospace;text-align:center;line-height:2.5;
  white-space:nowrap;z-index:101;}
.kbd{background:rgba(127,255,0,0.06);border:1px solid #1e3a1e;padding:1px 5px;color:#2a6a2a;font-family:'Share Tech Mono',monospace;font-size:14px;}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:50;display:none;}

/* Top-left: Level + $ only — no progress bar, same font as coins */
#tl{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:4px;width:182px;}
.level-lbl{font-size:22px;color:#2a6a2a;letter-spacing:2px;font-family:'Share Tech Mono',monospace;}
/* Stats panel below minimap — same width as minimap (182px) */
#statsPanel{position:absolute;top:132px;right:10px;display:none;gap:4px;width:182px;}
.scard{background:rgba(127,255,0,0.06);border:1px solid #1e3a1e;padding:12px 4px;text-align:center;flex:1;}
.sval{font-family:'Oswald',sans-serif;font-size:24px;line-height:1.1;color:#2a6a2a;}
.sval.st{color:#2a6a2a;}.sval.zo{color:#2a6a2a;}
.slbl{font-size:12px;color:#2a6a2a;letter-spacing:2px;margin-top:2px;}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.55);filter:brightness(2)}100%{transform:scale(1)}}
.bump{animation:bump 0.28s ease-out;}

/* Zone box — top center, ALWAYS VISIBLE during game */
#zoneBox{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:5px;padding:5px 18px;
  border:1px solid;display:none;pointer-events:none;white-space:nowrap;
  min-width:280px;text-align:center;}
.z-home{color:#7fff00;border-color:#7fff00;background:rgba(127,255,0,0.07);}
.z-loc{color:#ff3333;border-color:#ff3333;background:rgba(255,0,0,0.07);}
.z-neut{color:#ffaa00;border-color:#ffaa00;background:rgba(255,170,0,0.07);}
.z-enemy{color:#ff6600;border-color:#ff6600;background:rgba(255,100,0,0.07);}

/* Notification area — just below zoneBox, same width */
#notifArea{position:absolute;top:50px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  pointer-events:none;min-width:280px;}
.notif-toast{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:3px;
  padding:4px 18px;border:1px solid;opacity:0;transition:opacity .3s;
  white-space:nowrap;width:100%;text-align:center;}
#levelToast{color:#ffdd44;border-color:#ffdd44;background:rgba(26,22,0,0.95);font-size:13px;}
#reinToast{color:#ffaa00;border-color:#ffaa00;background:rgba(26,16,0,0.9);}
#pickupToast{color:#44ff88;border-color:#44ff88;background:rgba(0,28,10,0.9);}

#ctrlBar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;}
.h-key{display:flex;align-items:center;gap:4px;font-size:13px;color:#1a4a1a;}
.h-k{background:rgba(127,255,0,0.06);border:1px solid #1e3a1e;padding:2px 7px;font-size:13px;color:#3a7a3a;font-family:'Share Tech Mono',monospace;}

/* ── END SCREEN — centered ── */
#endScreen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:center;background:rgba(0,0,0,0.95);z-index:200;overflow-y:auto;padding:20px;}
.end-title{font-family:'Oswald',sans-serif;font-size:clamp(52px,9vw,108px);font-weight:700;letter-spacing:14px;
  color:#ff2020;text-shadow:0 0 40px #ff000099;animation:pulse 2.5s ease-in-out infinite;margin-bottom:6px;text-align:center;}
.end-title.victory{color:#7fff00;text-shadow:0 0 40px #7fff0099;animation:pulseGreen 2.5s ease-in-out infinite;}
@keyframes pulseGreen{0%,100%{text-shadow:0 0 40px #7fff0099;}50%{text-shadow:0 0 70px #7fff00cc,0 0 130px #7fff0055;}}
.end-sub{font-size:9px;letter-spacing:4px;margin-bottom:18px;text-align:center;}
/* Single centered column for stats */
.end-stats-wrap{display:flex;flex-direction:column;align-items:center;width:min(460px,96vw);margin-bottom:18px;}
.end-col-t{font-size:8px;color:#1e4a1e;letter-spacing:3px;border-bottom:1px solid #0d1a0d;
  padding-bottom:5px;margin-bottom:9px;width:100%;}
.sr{display:flex;justify-content:space-between;font-size:15px;color:#7fff00;padding:8px 16px;gap:50px;
  border-bottom:1px solid #070d07;letter-spacing:1px;width:100%;font-family:'Share Tech Mono',monospace;font-weight:400;line-height:1.4;}
.sv{color:#7fff00;font-size:15px;font-family:'Share Tech Mono',monospace;font-weight:400;line-height:1.4;}
.lb-row{display:flex;gap:7px;font-size:8px;padding:4px 0;border-bottom:1px solid #070d07;align-items:center;width:100%;}
.lb-r{color:#333;width:15px;}.lb-r.g{color:#ffcc44;}.lb-r.s{color:#aaa;}.lb-r.b{color:#cc7733;}
.lb-n{flex:1;color:#2a4a2a;letter-spacing:1px;}.lb-sc{color:#ff5533;font-family:'Oswald',sans-serif;font-size:11px;}
/* REDEPLOY button — identical to DEPLOY */
.end-btn{width:min(420px,92vw);padding:14px;background:rgba(127,255,0,0.06);border:2px solid #7fff00;
  color:#7fff00;font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:400;
  letter-spacing:3px;cursor:pointer;transition:all 0.3s;text-transform:uppercase;margin-top:4px;}
.end-btn:hover{background:#7fff00;color:#000;box-shadow:0 0 28px rgba(127,255,0,0.5);}
.end-btn:active{background:#7fff00;color:#000;box-shadow:0 0 28px rgba(127,255,0,0.7);}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<div id="menu">
  <div class="menu-title">WARZONE</div>
  <div class="menu-form">
    <div style="width:100%"><div class="m-label">Soldier Callsign</div>
      <input class="m-input" id="nameIn" type="text" placeholder="ENTER NAME" maxlength="14" autocomplete="off"></div>
    <div style="width:100%"><div class="m-label">Select Continent</div>
      <div class="country-grid" id="cgrid">
        <button class="c-btn" data-c="na">N.AMERICA</button>
        <button class="c-btn" data-c="sa">S.AMERICA</button>
        <button class="c-btn" data-c="eu">EUROPE</button>
        <button class="c-btn" data-c="af">AFRICA</button>
        <button class="c-btn" data-c="as">ASIA</button>
        <button class="c-btn" data-c="au">AUSTRALIA</button>
        <button class="c-btn" data-c="an">ANTARCTICA</button>
      </div></div>
    <button class="deploy-btn" id="dBtn" disabled>DEPLOY</button>
  </div>
  <!-- Instructions fixed at bottom of screen -->
  <div class="m-ctrl">
    <span class="kbd">WASD</span> MOVE &nbsp;·&nbsp; <span class="kbd">MOUSE</span> AIM &nbsp;·&nbsp;
    <span class="kbd">CLICK</span> FIRE &nbsp;·&nbsp; <span class="kbd">F</span> SHIELD &nbsp;·&nbsp;
    <span class="kbd">Q</span> SWITCH WEAPON
  </div>
</div>

<div id="hud">
  <!-- Notification area only — toasts for game events -->
  <div id="notifArea" style="position:absolute;bottom:60px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;min-width:280px;">
    <div class="notif-toast" id="levelToast"></div>
    <div class="notif-toast" id="reinToast"></div>
    <div class="notif-toast" id="pickupToast"></div>
  </div>
</div>

<!-- End screen: single centered column, no damage dealt, no daily challenges -->
<div id="endScreen">
  <div class="end-title" id="endTitle">RIP</div>
  <div class="end-sub" id="endSub"></div>
  <div class="end-stats-wrap">
    <div class="end-col-t">MATCH STATS</div>
    <div id="statsDiv"></div>
  </div>
  <button class="end-btn" id="endBtn" onclick="location.reload()">REDEPLOY</button>
</div>

<script>
// ══════════════════════════════════════════════════
//  WARZONE — 7-Continent Edition
// ══════════════════════════════════════════════════
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();addEventListener('resize',resize);

// ── Constants ──────────────────────────────────
const WW=5400,WH=3800,P_RAD=14,B_RAD=12,BUL_RAD=4;
const P_SPD_BASE=3.4,B_SPD=9.6,BOT_SPD=1.5,BOT_FAST=2.2;
const SHIELD_DUR=3800,SHIELD_CD=14000;
const P_HP=100,BOT_HP=45,BOSS_HP=360;
const SHOOT_RNG=230,DETECT_RNG=280,MELEE_RNG=48;
const MELEE_DMG=13,LOC_BONUS=120;
const REINFORCE_INTERVAL=60000;
const BOSS_SPAWN_TIME=90000;
const NIGHT_CYCLE=300000;
const XP_PER_KILL=25,XP_PER_ZONE=200,XP_PER_BOSS=500;
// Enemy airstrike: fires every 35-65s
const ENEMY_STRIKE_MIN=35000,ENEMY_STRIKE_MAX=65000;
const STRIKE_WARN_TIME=4500; // ms warning before impact
const STRIKE_RADIUS=260;  // much larger blast radius
const NUKE_STRIKE_RADIUS=800; // player nuke radius

// ── Weapon definitions ─────────────────────────
const WEAPONS=[
  {name:'AK-47',  dmg:22, rof:190,range:230,spread:.055,bullets:1,unlockLv:1},
  {name:'SNIPER', dmg:90, rof:1600,range:600,spread:.007,bullets:1,unlockLv:3},
  {name:'SHOTGUN',dmg:18, rof:580,range:130,spread:.28, bullets:5,unlockLv:5},
];

const UPGRADES=[
  {id:'damage',name:'DAMAGE BOOST',desc:'+25% dmg/tier', tiers:3,costs:[30,65,110]},
  {id:'speed', name:'SPEED BOOST', desc:'+10% spd/tier', tiers:3,costs:[25,55,90]},
  {id:'armor', name:'ARMOR PLATE', desc:'+30 HP/tier',   tiers:2,costs:[55,100]},
];

// ── Soldier Types ──────────────────────────────
const SOLDIER_TYPES={
  grunt:    {hpMul:1.0, spdMul:1.0, rngMul:1.0, dmgMul:1.0, cdMul:1.0,  sizeMul:1.0, tintCol:null},
  heavy:    {hpMul:2.4, spdMul:0.65,rngMul:0.7, dmgMul:1.5, cdMul:0.75, sizeMul:1.5, tintCol:'#aa6600'},
  sniper:   {hpMul:0.6, spdMul:1.1, rngMul:2.4, dmgMul:2.8, cdMul:2.8,  sizeMul:0.8, tintCol:'#006644'},
  elite:    {hpMul:1.6, spdMul:1.35,rngMul:1.2, dmgMul:1.4, cdMul:0.6,  sizeMul:1.0, tintCol:'#ffcc00'},
  grenadier:{hpMul:1.3, spdMul:0.9, rngMul:1.0, dmgMul:1.0, cdMul:2.0,  sizeMul:1.1, tintCol:'#ff6600'},
};
const SOLDIER_POOL={
  na:['grunt','grunt','sniper','elite','grenadier'],
  sa:['grunt','grunt','grunt','heavy','grenadier'],
  eu:['grunt','sniper','sniper','elite','elite'],
  af:['grunt','grunt','heavy','heavy','grenadier'],
  as:['grunt','elite','sniper','grenadier','elite'],
  au:['grunt','grunt','grunt','heavy','sniper'],
  an:['heavy','heavy','sniper','elite','grenadier'],
};
function getSoldierType(country){
  const pool=SOLDIER_POOL[country]||['grunt','grunt','grunt','heavy','sniper'];
  return pool[Math.floor(Math.random()*pool.length)];
}
const CD={
  na:{name:'N.AMERICA', flag:'🌎',col:'#1a0000',acc:'#ff3333',lit:'#200404'},
  sa:{name:'S.AMERICA', flag:'🌎',col:'#000511',acc:'#3366ff',lit:'#01061a'},
  eu:{name:'EUROPE',    flag:'🌍',col:'#051505',acc:'#44ff44',lit:'#081808'},
  af:{name:'AFRICA',    flag:'🌍',col:'#151500',acc:'#ffff44',lit:'#191900'},
  as:{name:'ASIA',      flag:'🌏',col:'#150015',acc:'#ff66ff',lit:'#1a001a'},
  au:{name:'AUSTRALIA', flag:'🌏',col:'#1a0800',acc:'#ff6600',lit:'#1e0a00'},
  an:{name:'ANTARCTICA',flag:'❄️', col:'#051525',acc:'#66ccff',lit:'#07182e'},
};

// ── Geometric continent shapes ──────────────────────────────
// WW=5400, WH=3800
// NA=Triangle, SA=Inverted Triangle, EU=Circle, AF=Square, AS=Oval, AU=Hexagon, AN=Rectangle
function makeHex(cx,cy,r){return Array.from({length:6},(_,i)=>{const a=i/6*Math.PI*2-Math.PI/2;return[Math.round(cx+r*Math.cos(a)),Math.round(cy+r*Math.sin(a))];});}
function makePentagon(cx,cy,rx,ry){
  // Wide flat pentagon (5 vertices) — good for Asia
  const pts=[];
  for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;pts.push([Math.round(cx+rx*Math.cos(a)),Math.round(cy+ry*Math.sin(a))]);}
  return pts;
}
const SHAPES={
  na:[ // Triangle — North America (top-left)
    [540,80],[60,1920],[1180,1920]
  ],
  sa:[ // Inverted Triangle — South America. Apex down, base on top (flat line first)
    [670,3320],[240,2020],[1100,2020]
  ],
  eu:[ // Hexagon — Europe (top-center)
    [1420,200],[1860,200],[2100,600],[1860,1000],[1420,1000],[1180,600]
  ],
  af:[ // Rectangle — Africa (center)
    [1200,1080],[2300,1080],[2300,3000],[1200,3000]
  ],
  as:makePentagon(3700,1100,1360,900),
  au:makeHex(4560,2820,430),
  an:[ // Rectangle — Antarctica (bottom strip with margin)
    [100,3380],[5300,3380],[5300,3700],[100,3700]
  ]
};

// ── Build territories (7 continents only) ──────
let territories=[];
for(const [id,pts] of Object.entries(SHAPES)){
  territories.push({id:id+'_h',name:CD[id].name,country:id,pts,bots:[],isHome:true,captureAnim:0,captureOldCol:null});
}

// ── Enemy airstrike state ──────────────────────
let enemyStrikes=[];   // {x,y,radius,warnLeft,hit,hitAge,srcCountry}
let enemyStrikeTimer=ENEMY_STRIKE_MIN+Math.random()*(ENEMY_STRIKE_MAX-ENEMY_STRIKE_MIN);

// ── State ──────────────────────────────────────
let gState='menu',player=null;
let bullets=[],particles=[],explosions=[],tripmines=[];
let camera={x:0,y:0},keys={},mouse={x:0,y:0},mw={x:0,y:0};
let lastT=0,curZone='',reinTimer=0,bossSpawnTimer=BOSS_SPAWN_TIME;
const _tt={};
let bossBot=null,bossDefeated=false;
let killStreak=0,totalKills=0;
let shakeAmt=0,shakeX=0,shakeY=0;
let timeOfDay=0.05,rainDrops=[];
let weatherState='clear',weatherTimer=55000,windX=0,lightningFlash=0,lightningTimer=0;
let dailyChallenges=[],challengeDone=[false,false,false];
const stats={kills:0,zonesCapt:0,dollarsTotal:0,crits:0,shotsFired:0,shotsHit:0,dmgDealt:0,dmgTaken:0,surviveTime:0,xpEarned:0,level:1};

// ── Seeded RNG ─────────────────────────────────
function seededRng(s){s=s|0;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;};}
const CHALLENGE_POOL=[
  {desc:'Eliminate 10 enemies',goal:10,stat:'kills'},
  {desc:'Eliminate 25 enemies',goal:25,stat:'kills'},
  {desc:'Capture 2 continents',goal:2, stat:'zonesCapt'},
  {desc:'Capture 4 continents',goal:4, stat:'zonesCapt'},
  {desc:'Collect $60',         goal:60,stat:'dollarsTotal'},
  {desc:'Collect $150',        goal:150,stat:'dollarsTotal'},
  {desc:'Land 5 critical hits',goal:5, stat:'crits'},
  {desc:'Reach Level 3',       goal:3, stat:'level'},
];
function getDailyChallenges(){
  const day=Math.floor(Date.now()/86400000);const rng=seededRng(day*31337);
  const arr=[...CHALLENGE_POOL];for(let i=arr.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr.slice(0,3);
}

// ── Leaderboard ────────────────────────────────
function getLB(){try{return JSON.parse(localStorage.getItem('wz_lb2')||'[]');}catch{return[];}}
function saveLB(name,country,score){
  const lb=getLB();lb.push({name,country,score,date:new Date().toLocaleDateString()});
  lb.sort((a,b)=>b.score-a.score);lb.splice(10);
  try{localStorage.setItem('wz_lb2',JSON.stringify(lb));}catch{}
}

// ── Input ──────────────────────────────────────
addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(gState==='menu')return;
  if(gState!=='playing')return;
  if(e.code==='KeyF')activateShield();
  if(e.code==='KeyQ')switchWeapon();
  ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k=>{if(k===e.code)e.preventDefault();});
});
addEventListener('keyup',e=>keys[e.code]=false);
// Add blur event listener to clear keys when window loses focus
addEventListener('blur',()=>keys={});
// Add visibility change listener to clear keys when tab becomes inactive
document.addEventListener('visibilitychange',()=>{if(document.hidden)keys={};});
addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});

// ── Audio (Web Audio API) ──────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(t,vol=1){
  try{
    if(AC.state==='suspended')AC.resume();
    const g=AC.createGain();g.connect(AC.destination);
    const noise=(dur,hpf=900,v=.18)=>{
      const b=AC.createBuffer(1,Math.floor(AC.sampleRate*dur),AC.sampleRate);
      const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5)*.9;
      const s=AC.createBufferSource();s.buffer=b;const f=AC.createBiquadFilter();
      f.type='highpass';f.frequency.value=hpf;s.connect(f);f.connect(g);
      g.gain.value=v*vol;s.start();s.stop(AC.currentTime+dur+.01);
    };
    const tone=(freq,type,dur,v=.15)=>{
      const o=AC.createOscillator();o.type=type;o.frequency.value=freq;o.connect(g);
      g.gain.setValueAtTime(v*vol,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
      o.start();o.stop(AC.currentTime+dur+.01);
    };
    if(t==='shoot')noise(.055,900,.17);
    else if(t==='sniper')noise(.1,2200,.28);
    else if(t==='shotgun')noise(.09,400,.34);
    else if(t==='hit')noise(.08,600,.26);
    else if(t==='shield'){tone(440,'sine',.05,.12);tone(1100,'sine',.2,.1);}
    else if(t==='crit')tone(1200,'square',.07,.09);
    else if(t==='pickup'){
      [0,.07,.14].forEach((dl,i)=>{const o=AC.createOscillator(),gg=AC.createGain();
        o.type='triangle';o.frequency.value=[660,880,1100][i];o.connect(gg);gg.connect(AC.destination);
        gg.gain.setValueAtTime(0,AC.currentTime+dl);gg.gain.linearRampToValueAtTime(.11*vol,AC.currentTime+dl+.04);
        gg.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dl+.16);o.start(AC.currentTime+dl);o.stop(AC.currentTime+dl+.2);
      });return;
    }else if(t==='levelup'){
      [0,.1,.2,.35].forEach((dl,i)=>{const o=AC.createOscillator(),gg=AC.createGain();
        o.type='triangle';o.frequency.value=[440,550,660,880][i];o.connect(gg);gg.connect(AC.destination);
        gg.gain.setValueAtTime(.13*vol,AC.currentTime+dl);gg.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dl+.22);
        o.start(AC.currentTime+dl);o.stop(AC.currentTime+dl+.26);
      });return;
    }else if(t==='capture'){
      [0,.1,.22,.36].forEach((dl,i)=>{const o=AC.createOscillator(),gg=AC.createGain();
        o.type='square';o.frequency.value=[330,440,550,660][i];o.connect(gg);gg.connect(AC.destination);
        gg.gain.setValueAtTime(.07*vol,AC.currentTime+dl);gg.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dl+.2);
        o.start(AC.currentTime+dl);o.stop(AC.currentTime+dl+.24);
      });return;
    }else if(t==='death')tone(240,'sawtooth',.8,.22);
    else if(t==='explosion')noise(.5,380,.5);
    else if(t==='nuke')noise(.9,250,.65);
    else if(t==='reinforce')tone(180,'square',.32,.09);
    else if(t==='thunder')noise(.9,300,.44);
    else if(t==='strike_warn'){tone(440,'sawtooth',.08,.12);setTimeout(()=>tone(880,'sawtooth',.08,.12),120);}
  }catch{}
}

// ── Enemy Automatic Airstrikes ─────────────────
function tickEnemyStrikes(dt){
  enemyStrikeTimer-=dt;
  if(enemyStrikeTimer<=0){
    enemyStrikeTimer=ENEMY_STRIKE_MIN+Math.random()*(ENEMY_STRIKE_MAX-ENEMY_STRIKE_MIN);
    launchEnemyStrike();
  }
  for(const s of enemyStrikes){
    if(s.hit){s.hitAge+=dt;continue;}
    s.warnLeft-=dt;
    if(s.warnLeft<=0){
      s.hit=true;s.hitAge=0;
      // Explosion
      explosions.push({x:s.x,y:s.y,r:0,maxR:STRIKE_RADIUS,life:1,col:'#ff4400'});
      spark(s.x,s.y,'#ff4400',28,7);spark(s.x,s.y,'#ffcc44',14,4);
      snd('explosion');
      // Proximity shake — bigger shake the closer the player is
      if(player?.alive){
        const distToBlast=Math.hypot(player.x-s.x,player.y-s.y);
        const proximityShake=distToBlast<STRIKE_RADIUS?28:(distToBlast<STRIKE_RADIUS*2?18:(distToBlast<STRIKE_RADIUS*4?10:4));
        shakeAmt=Math.max(shakeAmt,proximityShake);
        if(distToBlast<STRIKE_RADIUS&&!player.shOn){
          const dmg=50*(1-distToBlast/STRIKE_RADIUS);
          player.hp-=dmg;stats.dmgTaken+=dmg;snd('hit');
          spark(player.x,player.y,'#ff4444',8);
        }
      }
      // Damage enemy bots in zone
      for(const t of territories)for(const b of t.bots){
        if(!b.alive)continue;const d=Math.hypot(b.x-s.x,b.y-s.y);
        if(d<STRIKE_RADIUS){b.hit(60*(1-d/STRIKE_RADIUS));}
      }
    }
  }
  // Prune old strikes (keep hitAge < 2000ms for explosion render)
  enemyStrikes=enemyStrikes.filter(s=>!s.hit||s.hitAge<2000);
}

function launchEnemyStrike(){
  if(!player?.alive)return;
  const count=2+Math.floor(Math.random()*2); // 2-3 strikes
  const enemies=territories.filter(t=>t.country!==player.country&&t.country!=='neutral');
  const src=enemies[Math.floor(Math.random()*enemies.length)];
  snd('strike_warn');
  for(let i=0;i<count;i++){
    // Each strike lands on/near the player's current position
    // Stagger their timings slightly
    setTimeout(()=>{
      if(!player?.alive)return;
      const tx=Math.max(100,Math.min(WW-100,player.x+(Math.random()-0.5)*180));
      const ty=Math.max(100,Math.min(WH-100,player.y+(Math.random()-0.5)*180));
      enemyStrikes.push({x:tx,y:ty,radius:STRIKE_RADIUS,warnLeft:STRIKE_WARN_TIME,hit:false,hitAge:0,srcCountry:src?.country||'as',strikeIdx:i});
    },i*1200);
  }
}

const TRIPMINE_COUNT=100;
function spawnTripmines(){
  tripmines=[];
  for(let i=0;i<TRIPMINE_COUNT;i++){
    let x,y,attempts=0;
    do{x=300+Math.random()*(WW-600);y=300+Math.random()*(WH-600);attempts++;}
    while(getTAt(x,y)!==null&&attempts<80);
    tripmines.push({x,y,alive:true,armed:false,armTimer:2000,pulse:Math.random()*Math.PI*2});
  }
}
function updateTripmines(dt){
  for(const m of tripmines){
    if(!m.alive)continue;
    if(!m.armed){m.armTimer-=dt;if(m.armTimer<=0)m.armed=true;}
    if(!m.armed)continue;
    // Check player
    if(player?.alive){
      const d=Math.hypot(player.x-m.x,player.y-m.y);
      if(d<22){
        m.alive=false;
        explosions.push({x:m.x,y:m.y,r:0,maxR:70,life:1,col:'#ff6600'});
        spark(m.x,m.y,'#ff4400',22,6);spark(m.x,m.y,'#ffcc44',10,3);
        shakeAmt=Math.max(shakeAmt,18);
        if(!player.shOn){const dmg=55;player.hp-=dmg;stats.dmgTaken+=dmg;snd('hit');shakeAmt=20;}
        else{shakeAmt=20;}
        continue;
      }
    }
    // Check bots
    for(const t of territories){
      for(const b of t.bots){
        if(!b.alive||!m.alive)continue;
        const d=Math.hypot(b.x-m.x,b.y-m.y);
        if(d<22){
          m.alive=false;
          explosions.push({x:m.x,y:m.y,r:0,maxR:70,life:1,col:'#ff6600'});
          spark(m.x,m.y,'#ff4400',22,6);spark(m.x,m.y,'#ffcc44',10,3);
          shakeAmt=Math.max(shakeAmt,8);
          b.hit(55);break;
        }
      }
      if(!m.alive)break;
    }
  }
}
function drawTripmines(){
  const now=Date.now();
  for(const m of tripmines){
    if(!m.alive)continue;
    const sx=m.x-camera.x+shakeX,sy=m.y-camera.y+shakeY;
    if(sx<-30||sx>canvas.width+30||sy<-30||sy>canvas.height+30)continue;
    const blink=m.armed?(Math.sin(now/220+m.pulse)>0):false;
    ctx.save();ctx.translate(sx,sy);
    ctx.beginPath();ctx.rect(-7,-5,14,10);
    ctx.fillStyle=m.armed?(blink?'#661100':'#331100'):'#222200';
    ctx.strokeStyle=m.armed?(blink?'#ff3300':'#993300'):'#554400';
    ctx.lineWidth=1;ctx.fill();ctx.stroke();
    if(m.armed){
      ctx.strokeStyle=`rgba(255,50,0,${blink?.55:.18})`;ctx.lineWidth=.8;
      ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(-20,0);ctx.lineTo(20,0);ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.beginPath();ctx.arc(0,0,2.5,0,Math.PI*2);
    ctx.fillStyle=m.armed?(blink?'#ff3300':'#550000'):'#334400';ctx.fill();
    ctx.restore();
  }
}

function triggerAirstrike(){
  const eb=[];for(const t of territories)for(const b of t.bots)if(b.alive&&b.team!=='player')eb.push(b);
  for(let i=0;i<3;i++){
    const tgt=eb[Math.floor(Math.random()*eb.length)];if(!tgt)continue;
    const tx=tgt.x+(-25+Math.random()*50),ty=tgt.y+(-25+Math.random()*50);
    explosions.push({x:tx,y:ty,r:0,maxR:95,life:1,targeting:true,targetLife:1});
    setTimeout(()=>{
      explosions.push({x:tx,y:ty,r:0,maxR:95,life:1,col:'#ff6600'});
      spark(tx,ty,'#ff4400',20,6);spark(tx,ty,'#ffcc44',10,4);
      shakeAmt=Math.max(shakeAmt,13);
      for(const t of territories)for(const b of t.bots){
        if(!b.alive)continue;const d=Math.hypot(b.x-tx,b.y-ty);
        if(d<95){b.hit(75*(1-d/95));if(!b.alive){totalKills++;stats.kills++;onKill();addXP(XP_PER_KILL);}}
      }
    },1200+i*500);
  }
  // triggerAirstrike — no toast
}
function triggerNuke(){
  if(!player?.alive)return;
  // Target player's current location
  const nx=player.x+(Math.random()-0.5)*200;
  const ny=player.y+(Math.random()-0.5)*200;
  lightningFlash=1;snd('nuke');shakeAmt=30;
  explosions.push({x:nx,y:ny,r:0,maxR:NUKE_STRIKE_RADIUS,life:1,targeting:true,targetLife:1.4});
  setTimeout(()=>{
    explosions.push({x:nx,y:ny,r:0,maxR:NUKE_STRIKE_RADIUS,life:1,col:'#ffff00'});
    spark(nx,ny,'#ffff00',60,14);spark(nx,ny,'#ff8800',40,8);
    shakeAmt=35;lightningFlash=0.9;
    // Damage everything in the nuke radius
    for(const t of territories)for(const b of t.bots){
      if(!b.alive||b.team==='player')continue;
      const d=Math.hypot(b.x-nx,b.y-ny);
      if(d<NUKE_STRIKE_RADIUS){b.hit(999);if(!b.alive){totalKills++;stats.kills++;onKill();addXP(XP_PER_KILL);}}
    }
    // Also hurt the player a little if in blast radius (nuke is risky!)
    if(player?.alive&&!player.shOn){
      const pd=Math.hypot(player.x-nx,player.y-ny);
      if(pd<NUKE_STRIKE_RADIUS*.35){
        const dmg=40;player.hp-=dmg;stats.dmgTaken+=dmg;
        spark(player.x,player.y,'#ffff00',10);snd('hit');
      }
    }
  },1200);
}

function doShoot(){

  const wpn=WEAPONS[player.weaponIdx];

  const dmgMul=(1+player.upgrades.damage*.25);

class Bullet{
  constructor(x,y,vx,vy,team){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.team=team;
    this.alive=true;this.trail=[];this.dmg=22;this.crit=false;this.range=230;this.dist=0;}
  update(){
    this.trail.push({x:this.x,y:this.y});if(this.trail.length>6)this.trail.shift();
    if(weatherState==='storm')this.vx+=windX*.04;
    this.x+=this.vx;this.y+=this.vy;
    this.dist+=Math.hypot(this.vx,this.vy);
    if(this.x<0||this.x>WW||this.y<0||this.y>WH||this.dist>this.range*2.1)this.alive=false;
  }
  draw(){
    if(!this.alive)return;
    const cx=this.x-camera.x+shakeX,cy=this.y-camera.y+shakeY;
    ctx.save();
    for(let i=0;i<this.trail.length;i++){
      const a=(i/this.trail.length)*.38;
      ctx.beginPath();ctx.arc(this.trail[i].x-camera.x+shakeX,this.trail[i].y-camera.y+shakeY,BUL_RAD*.5,0,Math.PI*2);
      const c=this.crit?`rgba(255,255,80,${a})`:`rgba(255,200,40,${a})`;
      ctx.fillStyle=c;ctx.fill();
    }
    ctx.beginPath();ctx.arc(cx,cy,this.crit?BUL_RAD*1.4:BUL_RAD,0,Math.PI*2);
    const sc=this.team==='player'?(this.crit?'#ffff00':'#ffcc00'):this.team==='friendly'?'#55ff55':'#ff3300';
    const fc=this.team==='player'?(this.crit?'#ffff55':'#ffdd44'):this.team==='friendly'?'#88ff88':'#ff5533';
    ctx.shadowBlur=this.crit?16:8;ctx.shadowColor=sc;ctx.fillStyle=fc;ctx.fill();ctx.shadowBlur=0;ctx.restore();
  }
}

// ── Bot class ──────────────────────────────────
class Bot{
  constructor(x,y,country,team,terr,isBoss=false,soldierType=null){
    this.x=x;this.y=y;this.country=country;this.team=team;this.terr=terr;this.isBoss=isBoss;
    this.soldierType=soldierType||'grunt';
    const st=SOLDIER_TYPES[this.soldierType]||SOLDIER_TYPES.grunt;
    const hm=isBoss?8:st.hpMul,rm=isBoss?2.2:st.sizeMul;
    this.hp=BOT_HP*hm;this.maxHp=this.hp;this.alive=true;this.rad=B_RAD*rm;
    this.angle=Math.random()*Math.PI*2;this.state=Math.random()<.5?'patrol':'guard';
    this.px=0;this.py=0;this.pt=0;this.shootT=0;
    this.shootCD=(isBoss?700:1200*st.cdMul)+Math.random()*800;
    this.meleeT=0;this.chaseT=0;this.shootDmg=(isBoss?35:22)*st.dmgMul;
    this.shootRange=SHOOT_RNG*st.rngMul;
    this.moveSpd=BOT_SPD*st.spdMul;this.moveFast=BOT_FAST*st.spdMul;
    // Soldier colors match their continent
    this.col=isBoss?'#cc0000':(CD[country]?.acc||'#888888');
    this.bcol=isBoss?'#550000':(CD[country]?.col||'#333333');
  }
  update(dt){
    if(!this.alive)return;
    this.shootT-=dt;this.meleeT-=dt;this.pt-=dt;this.chaseT-=dt;
    if(this.team==='player'){
      // All friendly bots follow player as backup
      if(player?.alive){
        const d=Math.hypot(player.x-this.x,player.y-this.y);
        // Stop attacking if player is in their own territory
        if(player && isInHome(player.x, player.y, player.country)){
          // Still follow but don't attack in home territory
          if(d>80){
            const ang=Math.atan2(player.y-this.y,player.x-this.x);
            this.x+=Math.cos(ang)*this.moveFast;this.y+=Math.sin(ang)*this.moveFast;
            this.angle=ang;
          }
          return;
        }
        // Follow player and attack enemies when outside home territory
        if(d>120){
          const ang=Math.atan2(player.y-this.y,player.x-this.x);
          this.x+=Math.cos(ang)*this.moveFast;this.y+=Math.sin(ang)*this.moveFast;
          this.angle=ang;
        }
        // Attack nearby enemies
        let best=null,bd=DETECT_RNG*1.4;
        for(const t of territories)for(const b of t.bots){
          if(!b.alive||b.team==='player')continue;
          const ed=Math.hypot(b.x-this.x,b.y-this.y);if(ed<bd){best=b;bd=ed;}
        }
        if(best&&bd<DETECT_RNG*1.2)this._pursue(best.x,best.y,bd,best,false);
      }
    }else{
      if(!player?.alive){this._wander();return;}
      const d=Math.hypot(player.x-this.x,player.y-this.y);
      // Stop pursuing if player is in their own territory
      if(isInHome(player.x,player.y,player.country)){this._wander();return;}
      // 9. Screen-based detection: detect if bot is on screen (player can see it)
      const bsx=this.x-camera.x,bsy=this.y-camera.y;
      const onScreen=bsx>-80&&bsx<canvas.width+80&&bsy>-80&&bsy<canvas.height+80;
      const inLOC=!getTAt(player.x,player.y);
      const baseDet=onScreen?99999:(inLOC?DETECT_RNG+LOC_BONUS:DETECT_RNG);
      if(d<baseDet||this.chaseT>0){
        if(d<baseDet)this.chaseT=3500;
        this._pursue(player.x,player.y,d,player,isInHome(player.x,player.y,player.country));
      }else this._wander();
    }
    this.x=Math.max(this.rad,Math.min(WW-this.rad,this.x));
    this.y=Math.max(this.rad,Math.min(WH-this.rad,this.y));
  }
  _pursue(tx,ty,dist,target,meleeOnly){
    const ang=Math.atan2(ty-this.y,tx-this.x);this.angle=ang;
    const spd=(dist<this.shootRange?this.moveSpd*.6:this.moveFast*(this.isBoss?.5:1));
    if(dist>this.rad+MELEE_RNG+8){this.x+=Math.cos(ang)*spd;this.y+=Math.sin(ang)*spd;}
    if(meleeOnly||this.isBoss){
      if(dist<this.rad+MELEE_RNG&&this.meleeT<=0){
        this.meleeT=this.isBoss?1100:750;
        if(!target.shOn){
          const dmg=this.isBoss?30:MELEE_DMG;target.hp-=dmg;stats.dmgTaken+=dmg;
          spark(target.x,target.y,'#ff4444',5);snd('hit');shakeAmt=Math.max(shakeAmt,6);
        }
      }
    }else{
      if(dist<this.shootRange*(this.isBoss?1.4:1)&&this.shootT<=0){
        this.shootT=this.shootCD;const a=ang+(Math.random()-.5)*.14;
        const bTeam=this.team==='player'?'friendly':'enemy';
        const bul=new Bullet(this.x+Math.cos(a)*(this.rad+5),this.y+Math.sin(a)*(this.rad+5),
          Math.cos(a)*B_SPD*.78,Math.sin(a)*B_SPD*.78,bTeam);
        bul.dmg=this.shootDmg;bul.range=this.isBoss?400:this.shootRange;bullets.push(bul);
        // Grenadier: lob a grenade
        if(this.soldierType==='grenadier'&&Math.random()<0.35&&dist<this.shootRange){
          setTimeout(()=>{
            const gx=tx+(Math.random()-0.5)*80,gy=ty+(Math.random()-0.5)*80;
            explosions.push({x:gx,y:gy,r:0,maxR:80,life:1,col:'#ff6600'});
            spark(gx,gy,'#ff4400',16,5);shakeAmt=Math.max(shakeAmt,8);
            if(player?.alive){const d=Math.hypot(player.x-gx,player.y-gy);if(d<80&&!player.shOn){const dmg=35*(1-d/80);player.hp-=dmg;stats.dmgTaken+=dmg;snd('hit');}}
          },800+Math.random()*400);
        }
      }
    }
  }
  _wander(){
    if(this.state==='guard'){this.angle+=.008;return;}
    if(this.pt<=0){
      const a=Math.random()*Math.PI*2;this.px=Math.cos(a)*BOT_SPD;this.py=Math.sin(a)*BOT_SPD;
      this.pt=1600+Math.random()*2200;this.angle=a;if(Math.random()<.15)this.state='guard';
    }
    const nx=this.x+this.px,ny=this.y+this.py;
    let canMove=false;
    if(this.terr){const p=this.terr.pts||null;
      if(p)canMove=inPoly(nx,ny,p);
    }else canMove=nx>this.rad&&nx<WW-this.rad&&ny>this.rad&&ny<WH-this.rad;
    if(canMove){this.x=nx;this.y=ny;}else this.pt=0;
  }
  hit(dmg){
    this.hp-=dmg;spark(this.x,this.y,'#ff8844',this.isBoss?7:4);
    if(this.hp<=0){this.alive=false;spark(this.x,this.y,'#ff5500',this.isBoss?22:12);
      if(this.isBoss){addXP(XP_PER_BOSS);shakeAmt=25;bossDefeated=true;}
    }
  }
  draw(){
    if(!this.alive)return;
    const sx=this.x-camera.x+shakeX,sy=this.y-camera.y+shakeY;
    if(sx<-60||sx>canvas.width+60||sy<-60||sy>canvas.height+60)return;

    if(this.isBoss){ctx.beginPath();ctx.arc(0,0,this.rad+9,0,Math.PI*2);ctx.fillStyle=`rgba(200,0,0,${.08+.05*Math.sin(Date.now()/200)})`;ctx.fill();}
    ctx.beginPath();ctx.arc(2,2,this.rad,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.3)';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,this.rad,0,Math.PI*2);ctx.fillStyle=this.bcol;ctx.fill();
    ctx.strokeStyle=this.col;ctx.lineWidth=this.isBoss?3:2;ctx.stroke();
    ctx.beginPath();ctx.arc(0,-2,this.isBoss?9.5:6.5,0,Math.PI*2);ctx.fillStyle=this.col;ctx.fill();
    if(!this.isBoss){ctx.fillStyle='#555';ctx.fillRect(7,-3.5,18,6);ctx.fillStyle='#333';ctx.fillRect(21,-2.5,5,5);}
    else{ctx.fillStyle='#880000';ctx.fillRect(14,-5,28,9);ctx.fillStyle='#550000';ctx.fillRect(38,-4,9,7);}
    ctx.restore();
    // HP bar
    const bw=this.rad*2.4+(this.isBoss?30:0);const bx=sx-bw/2,by=sy-this.rad-(this.isBoss?14:9);
    ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,this.isBoss?7:4);
    ctx.fillStyle=this.hp/this.maxHp>.5?'#44ee44':(this.hp/this.maxHp>.2?'#eeaa22':'#ee4444');
    ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),this.isBoss?7:4);
    if(this.isBoss){ctx.font='bold 9px Share Tech Mono,monospace';ctx.textAlign='center';ctx.fillStyle='#ff2222';ctx.fillText('BOSS',sx,by-4);}
  }
}

// ── Player class ───────────────────────────────
class Player{
  constructor(country,name){
    this.country=country;this.name=name;
    const ht=territories.find(t=>t.id===country+'_h');
    const[cx,cy]=polyCenter(ht.pts);this.x=cx;this.y=cy;
    this.hp=P_HP;this.maxHp=P_HP;this.alive=true;this.angle=0;
    this.shOn=false;this.shT=0;this.shCD=0;this.shootCD=0;
    this.weaponIdx=0;this.unlockedWeapons=[true,true,true];
    this.upgrades={damage:0,speed:0,armor:0};
    this.col=CD[country].acc;this.bcol=CD[country].col;
  }
  update(dt){
    if(!this.alive)return;
    this.shootCD=Math.max(0,this.shootCD-dt);
    let mx=0,my=0;
    if(keys.KeyW||keys.ArrowUp)my-=1;if(keys.KeyS||keys.ArrowDown)my+=1;
    if(keys.KeyA||keys.ArrowLeft)mx-=1;if(keys.KeyD||keys.ArrowRight)mx+=1;
    if(mx&&my){mx*=.707;my*=.707;}
    let spd=P_SPD_BASE*(1+this.upgrades.speed*.1);
    if(weatherState==='rain')spd*=.83;if(weatherState==='storm')spd*=.72;
    this.x=Math.max(P_RAD,Math.min(WW-P_RAD,this.x+mx*spd));
    this.y=Math.max(P_RAD,Math.min(WH-P_RAD,this.y+my*spd));
    this.angle=Math.atan2(mw.y-this.y,mw.x-this.x);
    if(this.shOn){this.shT-=dt;if(this.shT<=0){this.shOn=false;this.shCD=SHIELD_CD;}}
    else if(this.shCD>0)this.shCD-=dt;
    this.hp=Math.max(0,Math.min(this.maxHp,this.hp));
    if(this.hp<=0)this.alive=false;
  }
  draw(){
    const sx=this.x-camera.x+shakeX,sy=this.y-camera.y+shakeY;
    ctx.save();ctx.translate(sx,sy);
    // Shield ring (active)
    if(this.shOn){
      const pulse=.55+.28*Math.sin(Date.now()/90);
      ctx.beginPath();ctx.arc(0,0,P_RAD+14,0,Math.PI*2);
      ctx.strokeStyle=`rgba(80,140,255,${pulse})`;ctx.lineWidth=5;ctx.stroke();
      ctx.beginPath();ctx.arc(0,0,P_RAD+8,0,Math.PI*2);
      ctx.strokeStyle='rgba(120,160,255,.18)';ctx.lineWidth=10;ctx.stroke();
    }
    ctx.rotate(this.angle);
    ctx.beginPath();ctx.arc(2,2,P_RAD,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.35)';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,P_RAD,0,Math.PI*2);ctx.fillStyle=this.bcol;ctx.fill();
    ctx.strokeStyle=this.col;ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.arc(0,-1,8.5,0,Math.PI*2);ctx.fillStyle=this.col;ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='7px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',0,-1);
    const wi=this.weaponIdx;
    if(wi===0){ctx.fillStyle='#4a4a4a';ctx.fillRect(11,-4.5,24,8);ctx.fillStyle='#333';ctx.fillRect(31,-3,8,6);}
    else if(wi===1){ctx.fillStyle='#3a3a3a';ctx.fillRect(11,-3.5,36,6);ctx.fillStyle='#555';ctx.fillRect(25,-7,11,4);}
    else{ctx.fillStyle='#4a3a2a';ctx.fillRect(11,-5.5,17,10);ctx.fillStyle='#333';ctx.fillRect(24,-4,12,7);}
    ctx.restore();
    // Name
    ctx.save();ctx.font='bold 10px Share Tech Mono,monospace';ctx.textAlign='center';
    ctx.shadowColor=this.col;ctx.shadowBlur=6;ctx.fillStyle=this.col;
    ctx.fillText(this.name,sx,sy-P_RAD-18);ctx.restore();
    // HP bar
    const bw=P_RAD*3.4;
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(sx-bw/2-1,sy-P_RAD-16,bw+2,6);
    ctx.fillStyle=this.hp>50?'#44ff66':(this.hp>25?'#ffaa22':'#ff3333');
    ctx.fillRect(sx-bw/2,sy-P_RAD-15,bw*(this.hp/this.maxHp),4);

  }
}

// ── Helpers ────────────────────────────────────
function inPoly(x,y,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const[xi,yi]=pts[i],[xj,yj]=pts[j];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}
function getTAt(x,y){for(const t of territories){if(t.pts&&inPoly(x,y,t.pts))return t;}return null;}
function isInHome(x,y,c){const t=territories.find(t=>t.id===c+'_h');return t&&(t.pts?inPoly(x,y,t.pts):false);}
function polyCenter(pts){return[pts.reduce((s,p)=>s+p[0],0)/pts.length,pts.reduce((s,p)=>s+p[1],0)/pts.length];}
function getNightOp(){return Math.sin(timeOfDay*Math.PI)*.62;}
function randomInTerr(t){
  const xs=t.pts.map(p=>p[0]),ys=t.pts.map(p=>p[1]);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  for(let i=0;i<80;i++){const x=minX+Math.random()*(maxX-minX),y=minY+Math.random()*(maxY-minY);if(inPoly(x,y,t.pts))return[x,y];}
  return[(minX+maxX)/2,(minY+maxY)/2];
}

// ── Spawn bots — typed soldiers per continent ──
function spawnBots(t,pc){
  t.bots=[];
  const count=t.isHome?22:(16+Math.floor(Math.random()*7));
  const team=t.country===pc?'player':'enemy';
  const c=t.country;
  for(let i=0;i<count;i++){
    const[bx,by]=randomInTerr(t);
    const st=team==='player'?'grunt':getSoldierType(c);
    const bot=new Bot(bx,by,c,team,t,false,st);
    // 10. 20% of player's bots become escorts (follow player), 80% guard base
    if(team==='player')bot.role=Math.random()<0.2?'escort':'guard';
    t.bots.push(bot);
  }
}

// ── Reinforcements — only for player's own territories, enemies NEVER respawn ─
function doReinforcements(){
  for(const t of territories){
    // Only reinforce player-owned territories (enemies stay dead once cleared)
    if(t.country!==player?.country)continue;
    if(t.bots.filter(b=>b.alive).length>3)continue;
    for(let i=0;i<2;i++){
      const[bx,by]=randomInTerr(t);
      const st=getSoldierType(t.country);
      t.bots.push(new Bot(bx,by,t.country,'player',t,false,st));
    }
  }
}

// ── Territory capture ──────────────────────────
function checkCapture(){
  if(!player?.alive)return;
  for(const t of territories){
    if(t.country===player.country)continue;
    if(t.bots.length>0&&t.bots.filter(b=>b.alive).length===0){
      t.captureOldCol=CD[t.country]?.col||'#0d1308';
      t.captureAnim=1.0;
      const oldCountry=t.country;
      t.country=player.country; // territory now belongs to player's continent
      // Overwrite CD colours for this territory's rendering so it looks like player's land
      // (we use t.country so CD[player.country] is automatically used everywhere already)
      snd('capture');stats.zonesCapt++;addXP(XP_PER_ZONE);
      shakeAmt=Math.max(shakeAmt,8);
      t.bots=[];
      for(let i=0;i<6;i++){const[bx,by]=randomInTerr(t);t.bots.push(new Bot(bx,by,player.country,'player',t,false,'grunt'));}
    }
  }
}

// ── Rain ───────────────────────────────────────
function initRain(){rainDrops=[];for(let i=0;i<110;i++)rainDrops.push({x:Math.random()*WW,y:Math.random()*WH,spd:8+Math.random()*5,len:8+Math.random()*10});}
function updateRain(dt){for(const r of rainDrops){r.y+=r.spd*(dt/14);r.x+=windX*(dt/14);if(r.y>WH)r.y=-10;if(r.x>WW)r.x=0;if(r.x<0)r.x=WW;}}
function drawRain(alpha){
  ctx.save();ctx.strokeStyle=`rgba(160,200,255,${alpha})`;ctx.lineWidth=.7;
  for(const r of rainDrops){const sx=r.x-camera.x+shakeX,sy=r.y-camera.y+shakeY;
    if(sx<-20||sx>canvas.width+20||sy<-20||sy>canvas.height+20)continue;
    ctx.beginPath();ctx.moveTo(sx-windX*.3,sy);ctx.lineTo(sx+windX*.15,sy+r.len);ctx.stroke();}
  ctx.restore();
}

// ── Check if player is in any active airstrike zone ─
function getPlayerStrikeWarning(){
  if(!player?.alive)return null;
  for(const s of enemyStrikes){
    if(s.hit)continue;
    if(Math.hypot(player.x-s.x,player.y-s.y)<s.radius)return s;
  }
  return null;
}

// ── Draw territory ────────────────────────────
function drawTerr(t,dt){
  if(!t.pts)return;
  const xs=t.pts.map(p=>p[0]),ys=t.pts.map(p=>p[1]);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const scx=(maxX-camera.x+shakeX);const scy=(maxY-camera.y+shakeY);
  if((minX-camera.x+shakeX)>canvas.width+60||(minY-camera.y+shakeY)>canvas.height+60||scx<-60||scy<-60)return;

  // Straight-line poly path for all shapes
  function buildPath(){
    ctx.beginPath();
    ctx.moveTo(t.pts[0][0]-camera.x+shakeX, t.pts[0][1]-camera.y+shakeY);
    for(let i=1;i<t.pts.length;i++){
      ctx.lineTo(t.pts[i][0]-camera.x+shakeX, t.pts[i][1]-camera.y+shakeY);
    }
    ctx.closePath();
  }
  const buildBlockyPath=buildPath;

  buildBlockyPath();

  // Determine fill color
  let fillCol=CD[t.country]?.col||'#0d1308';
  // Player-owned territory: use their accent colour (lit = brighter version)
  if(player&&t.country===player.country){
    fillCol=CD[player.country].lit;
  }
  if(t.captureAnim>0){
    t.captureAnim-=dt/1800;if(t.captureAnim<0)t.captureAnim=0;
    const rate=80+((1-t.captureAnim)*220);const showNew=Math.sin(Date.now()/rate)>0;
    fillCol=showNew?(player&&t.country===player.country?CD[player.country].lit:(CD[t.country]?.col||'#0d1308')):t.captureOldCol;
  }

  // Check if player is standing in this territory and a strike is incoming
  const playerHere=player&&inPoly(player.x,player.y,t.pts);
  const strikeWarning=playerHere?getPlayerStrikeWarning():null;
  if(strikeWarning){const blink=Math.sin(Date.now()/180)>0;fillCol=blink?'#440000':'#220000';}

  ctx.fillStyle=fillCol;ctx.fill();

  // Strike zone red blink overlay
  if(strikeWarning){
    const blink=Math.sin(Date.now()/180)>0;
    if(blink){
      buildBlockyPath();ctx.save();ctx.clip();
      ctx.fillStyle='rgba(255,20,20,0.22)';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.restore();
    }
  }

  // Dot texture
  ctx.fillStyle='rgba(255,255,255,.014)';
  for(let tx2=Math.max(0,minX);tx2<Math.min(WW,maxX);tx2+=22)
    for(let ty2=Math.max(0,minY);ty2<Math.min(WH,maxY);ty2+=22)
      if((tx2+ty2+Math.floor(minX/9))%3===0&&inPoly(tx2,ty2,t.pts))
        ctx.fillRect(tx2-camera.x+shakeX,ty2-camera.y+shakeY,2,2);

  // Blocky border stroke
  buildBlockyPath();
  const owned=player&&t.country===player.country;
  const bc=owned?CD[player.country].acc:(CD[t.country]?.acc||'#333');
  ctx.strokeStyle=bc;ctx.lineWidth=owned?3:1.5;
  if(owned){ctx.shadowColor=bc;ctx.shadowBlur=13;}
  ctx.stroke();ctx.shadowBlur=0;

  // Label
  const[cx,cy]=polyCenter(t.pts);
  ctx.save();ctx.textAlign='center';
  ctx.font='bold 13px Share Tech Mono,monospace';ctx.fillStyle='rgba(255,255,255,.2)';
  ctx.fillText(t.name,cx-camera.x+shakeX,cy-camera.y-34+shakeY);
  ctx.restore();
}

// ── Draw explosion effects ─────────────────────
function drawExplosions(){
  for(let i=explosions.length-1;i>=0;i--){
    const e=explosions[i];
    const sx=e.x-camera.x+shakeX,sy=e.y-camera.y+shakeY;
    if(e.targeting){e.targetLife-=.006;
      ctx.beginPath();ctx.arc(sx,sy,e.maxR*(0.5+e.targetLife*.5),0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,50,50,${e.targetLife*.65})`;ctx.lineWidth=2;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
      ctx.beginPath();ctx.arc(sx,sy,6,0,Math.PI*2);ctx.fillStyle=`rgba(255,50,50,${e.targetLife})`;ctx.fill();
      if(e.targetLife<=0)explosions.splice(i,1);
    }else{
      e.r=Math.min(e.r+e.maxR*.1,e.maxR);e.life-=.04;
      ctx.beginPath();ctx.arc(sx,sy,e.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,100,0,${e.life*.22})`;ctx.fill();
      ctx.strokeStyle=`rgba(255,150,50,${e.life*.55})`;ctx.lineWidth=2;ctx.stroke();
      if(e.life<=0)explosions.splice(i,1);
    }
  }
}

// ── Minimap (top-right) ────────────────────────
function drawMinimap(){
  const mmW=220,mmH=140,mmX=Math.round(canvas.width/2-mmW/2),mmY=10;
  const scX=mmW/WW,scY=mmH/WH;
  ctx.fillStyle='rgba(0,5,0,.88)';ctx.fillRect(mmX,mmY,mmW,mmH);
  for(const t of territories){
    // If player owns this territory, use their accent/lit colour
    let c;
    if(player&&t.country===player.country){
      c=CD[player.country].acc;
    }else{
      c=CD[t.country]?.acc||'#111';
    }
    ctx.fillStyle=c;ctx.globalAlpha=player&&t.country===player.country?0.55:0.25;
    if(t.pts){
      ctx.beginPath();
      ctx.moveTo(mmX+t.pts[0][0]*scX, mmY+t.pts[0][1]*scY);
      for(let i=1;i<t.pts.length;i++){
        ctx.lineTo(mmX+t.pts[i][0]*scX, mmY+t.pts[i][1]*scY);
      }
      ctx.closePath();ctx.fill();
      ctx.globalAlpha=1;
      // Border
      if(player&&t.country===player.country){
        ctx.strokeStyle=CD[player.country].acc;ctx.lineWidth=1.2;ctx.stroke();
      }else{
        ctx.strokeStyle=CD[t.country]?.acc||'#333';ctx.lineWidth=0.5;ctx.stroke();
      }
    }
  }
  ctx.globalAlpha=1;
  // ── Soldier dots on minimap (instead of gold/pickups) ──
  for(const t of territories){
    for(const b of t.bots){
      if(!b.alive)continue;
      ctx.beginPath();ctx.arc(mmX+b.x*scX,mmY+b.y*scY,1.5,0,Math.PI*2);
      ctx.fillStyle=b.team==='player'?'#44ff88':'#ff4444';ctx.fill();
    }
  }
  if(bossBot?.alive){ctx.beginPath();ctx.arc(mmX+bossBot.x*scX,mmY+bossBot.y*scY,3.5,0,Math.PI*2);ctx.fillStyle='#ff0000';ctx.fill();}
  if(player){ctx.beginPath();ctx.arc(mmX+player.x*scX,mmY+player.y*scY,3,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();}
}

// ── Draw strike warning circles ────────────────
function drawStrikeWarnings(){
  const now=Date.now();
  for(const s of enemyStrikes){
    if(s.hit)continue;
    const sx=s.x-camera.x+shakeX,sy=s.y-camera.y+shakeY;
    const frac=Math.max(0,s.warnLeft/STRIKE_WARN_TIME);
    const outerR=(s.radius*(1+frac*1.5));
    const blink=Math.sin(now/120)>0;
    const alpha=0.55+0.35*(1-frac);
    // Outer closing ring
    ctx.beginPath();ctx.arc(sx,sy,outerR,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,40,0,${alpha*0.6})`;ctx.lineWidth=3;
    ctx.setLineDash([12,8]);ctx.stroke();ctx.setLineDash([]);
    // Inner target circle at actual blast radius
    ctx.beginPath();ctx.arc(sx,sy,s.radius,0,Math.PI*2);
    ctx.strokeStyle=blink?`rgba(255,80,0,${alpha})`:`rgba(255,40,0,${alpha*0.4})`;
    ctx.lineWidth=2;ctx.stroke();
  }
}

// ── Main loop ──────────────────────────────────
function loop(ts){
  const dt=ts-lastT;lastT=ts;
  if(gState==='playing')tick(dt);
  if(gState==='playing'||gState==='ending')render_(dt);
  if(gState==='playing'||gState==='ending')requestAnimationFrame(loop);
}

function tick(dt){
  if(!player?.alive){endGame();return;}
  stats.surviveTime+=dt/1000;
  mw.x=mouse.x+camera.x;mw.y=mouse.y+camera.y;
  player.update(dt);
  camera.x+=(player.x-canvas.width/2-camera.x)*.1;
  camera.y+=(player.y-canvas.height/2-camera.y)*.1;
  camera.x=Math.max(0,Math.min(WW-canvas.width,camera.x));
  camera.y=Math.max(0,Math.min(WH-canvas.height,camera.y));
  shakeAmt*=.83;shakeX=(Math.random()-.5)*shakeAmt*2;shakeY=(Math.random()-.5)*shakeAmt*2;
  if(shakeAmt<.1){shakeAmt=0;shakeX=0;shakeY=0;}
  weatherTimer-=dt;
  if(weatherTimer<=0){
    const ws=['clear','rain','fog','storm','clear','clear'];
    weatherState=ws[Math.floor(Math.random()*ws.length)];
    weatherTimer=45000+Math.random()*55000;
    windX=weatherState==='storm'?(Math.random()-.5)*4:0;
  }
  if(weatherState==='rain'||weatherState==='storm')updateRain(dt);
  lightningFlash*=.88;
  if(weatherState==='storm'){lightningTimer-=dt;if(lightningTimer<=0){lightningTimer=3000+Math.random()*8000;lightningFlash=1;}}
  timeOfDay+=dt/NIGHT_CYCLE;if(timeOfDay>=1)timeOfDay-=1;
  for(const t of territories)for(const b of t.bots)b.update(dt);
  if(bossBot?.alive)bossBot.update(dt);
  // Boss spawn
  if(!bossBot&&!bossDefeated){bossSpawnTimer-=dt;if(bossSpawnTimer<=0){
    const bx=300+Math.random()*(WW-600),by=300+Math.random()*(WH-600);
    bossBot=new Bot(bx,by,'as','enemy',null,true);
    snd('nuke');shakeAmt=18;
  }}
  // Enemy automatic airstrikes
  tickEnemyStrikes(dt);
  // Bullets
  for(const b of bullets)b.update();
  for(const b of bullets){
    if(!b.alive)continue;
    if(b.team==='enemy'){
      if(player.shOn&&Math.hypot(b.x-player.x,b.y-player.y)<P_RAD+16){b.alive=false;spark(b.x,b.y,'#88aaff',4);}
      else if(!player.shOn&&Math.hypot(b.x-player.x,b.y-player.y)<P_RAD+BUL_RAD){
        const dmg=b.dmg||22;player.hp-=dmg;b.alive=false;stats.dmgTaken+=dmg;
        spark(player.x,player.y,'#ff4444',7);snd('hit');shakeAmt=Math.max(shakeAmt,9);
      }
    }
    if(b.team==='player'||b.team==='friendly'){
      const allBots=[...(bossBot?.alive?[bossBot]:[])];
      for(const t of territories)for(const bot of t.bots)allBots.push(bot);
      let hit=false;
      for(const bot of allBots){
        if(!bot.alive||bot.team==='player')continue;
        if(Math.hypot(b.x-bot.x,b.y-bot.y)<bot.rad+BUL_RAD){
          const dmg=b.dmg||22;bot.hit(dmg);stats.dmgDealt+=dmg;b.alive=false;hit=true;
          if(b.team==='player')stats.shotsHit++;
          if(!bot.alive){
            if(b.team==='player'){totalKills++;stats.kills++;onKill();addXP(bot.isBoss?XP_PER_BOSS:XP_PER_KILL);}
          }break;
        }
        if(hit)break;
      }
    }
  }
  updateTripmines(dt);
  checkCapture();
  bullets=bullets.filter(b=>b.alive);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vx*=.87;p.vy*=.87;p.life-=p.txt?.022:.028;}
  particles=particles.filter(p=>p.life>0);
  reinTimer-=dt;if(reinTimer<=0){reinTimer=REINFORCE_INTERVAL;doReinforcements();}
  updateHUD();
  if(player&&territories.filter(t=>t.country===player.country).length===territories.length){endGame('victory');}
}

function render_(dt=0){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#050d05';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(const t of territories)drawTerr(t,dt);
  drawStrikeWarnings();
  drawExplosions();
  if(weatherState==='rain'||weatherState==='storm')drawRain(weatherState==='storm'?.28:.18);
  if(weatherState==='fog'){ctx.fillStyle='rgba(175,195,185,.3)';ctx.fillRect(0,0,canvas.width,canvas.height);}
  const nop=getNightOp();
  if(nop>0.04){ctx.fillStyle=`rgba(5,0,20,${nop*.7})`;ctx.fillRect(0,0,canvas.width,canvas.height);}
  if(lightningFlash>0.05){ctx.fillStyle=`rgba(235,235,255,${lightningFlash*.32})`;ctx.fillRect(0,0,canvas.width,canvas.height);}
  for(const t of territories)for(const b of t.bots)b.draw();
  if(bossBot?.alive)bossBot.draw();
  drawTripmines();
  for(const b of bullets)b.draw();
  for(const p of particles){
    if(p.txt){const al=Math.min(1,p.life*3);ctx.save();ctx.globalAlpha=al;ctx.font='bold 12px Share Tech Mono,monospace';
      ctx.fillStyle=p.col;ctx.textAlign='center';ctx.fillText(p.txt,p.x-camera.x+shakeX,p.y-camera.y+shakeY);ctx.restore();}
    else{const hex=Math.floor(p.life*255).toString(16).padStart(2,'0');
      ctx.beginPath();ctx.arc(p.x-camera.x+shakeX,p.y-camera.y+shakeY,p.sz,0,Math.PI*2);
      ctx.fillStyle=p.col+hex;ctx.fill();}
  }
  if(player?.alive)player.draw();
  drawMinimap();
}

// ── End game ───────────────────────────────────
let _ended=false;
function endGame(type='death'){
  if(_ended)return;_ended=true;gState='ended';
  snd('death');
  const score=(stats.kills*100)+(stats.zonesCapt*300)+(stats.xpEarned*2);
  saveLB(player?.name||'UNKNOWN',player?.country||'as',score);
  const isVic=type==='victory';
  const et=document.getElementById('endTitle'),es=document.getElementById('endSub'),eb=document.getElementById('endBtn');
  // Title is always "RIP" in the big glowing Oswald style
  et.textContent='RIP';
  et.className='end-title'; // always red pulsing
  if(isVic){
    es.style.color='#3a6a3a';es.textContent=`🏆 ${CD[player.country].flag} ${player.name.toUpperCase()} DOMINATES THE WORLD`;
  }else{
    es.style.color='#3a2a2a';es.textContent='';
  }
  const acc=stats.shotsFired>0?Math.round(stats.shotsHit/stats.shotsFired*100):0;
  document.getElementById('statsDiv').innerHTML=`
    <div class="sr"><span>Kills</span><span class="sv">${stats.kills}</span></div>
    <div class="sr"><span>Continents </span><span class="sv">${stats.zonesCapt}</span></div>
    <div class="sr"><span>Accuracy</span><span class="sv">${acc}%</span></div>`;
  document.getElementById('endScreen').style.display='flex';
}
</script>
